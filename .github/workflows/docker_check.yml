name: Docker Image Check

on:
  push:
    branches: ["Develop"]
  workflow_dispatch:
  
  jobs:
    Docker-Check:
      runs-on: ubuntu-latest
      permissions: 
        contents: read
      steps:
        - name: Checkout

          uses: actions/checkout@v4

        - name: Log in to Docker Hub

          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME}}
            password: ${{ secrets.DOCKER_PASSWORD}}